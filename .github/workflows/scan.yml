name: Job Scan

on:
  schedule:
    # Every hour at :15 — offset to avoid the top-of-hour stampede on shared runners.
    - cron: '15 * * * *'
  workflow_dispatch:  # Lets you trigger a run manually from the Actions tab.

# Allow the workflow to commit updated state files and create issues.
permissions:
  contents: write
  issues: write

# Don't run two scans at the same time on the same ref.
concurrency:
  group: job-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scan
        id: scan
        run: |
          set -o pipefail
          python -m src.run | tee scan_output.log
          # Parse the structured output blocks from stdout
          {
            echo "new_count=$(awk '/===NEW_JOBS_COUNT===/{flag=1; next} /===ISSUE_TITLE===/{flag=0} flag' scan_output.log | tr -d '[:space:]')"
            echo "issue_title<<EOF_TITLE"
            awk '/===ISSUE_TITLE===/{flag=1; next} /===ISSUE_BODY===/{flag=0} flag' scan_output.log
            echo "EOF_TITLE"
          } >> "$GITHUB_OUTPUT"
          # Body goes into a file for the issue-creation step (avoids huge env vars)
          awk '/===ISSUE_BODY===/{flag=1; next} flag' scan_output.log > issue_body.md

      - name: Create issue when new jobs found
        if: steps.scan.outputs.new_count != '0' && steps.scan.outputs.new_count != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ steps.scan.outputs.issue_title }}
        run: |
          # Ensure the label exists (create it if missing — first-run setup).
          gh label create "new-jobs" --color "0E8A16" --description "Auto-generated job alerts" 2>/dev/null || true
          gh issue create \
            --title "$ISSUE_TITLE" \
            --body-file issue_body.md \
            --label "new-jobs"

      - name: Commit updated state
        run: |
          git config user.name "job-agent[bot]"
          git config user.email "job-agent@users.noreply.github.com"
          git add data/seen_jobs.json data/jobs.md data/last_run.md data/dead_tokens.md || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update job scan state [skip ci]"
            git push
          fi
